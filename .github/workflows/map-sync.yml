name: 3분 단위 스퀘어맵 실시간 동기화

on:
  schedule:
    - cron: '*/3 * * * *' # 3분마다 자동으로 전 세계 깃허브 서버가 이 작업을 실행합니다.
  workflow_dispatch: # 수동으로 언제든지 실행할 수 있는 버튼을 만듭니다.

jobs:
  sync-map:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 위어드호스트에서 스퀘어맵 폴더 통째로 복사 (미러링)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          # 하위 폴더와 대량의 지도 이미지 파일들을 깨짐 없이 가져오기 위해 lftp를 설치합니다.
          sudo apt-get update && sudo apt-get install -y lftp
          
          # 확인된 주소인 '/squaremap/web' 폴더의 내용을 내 깃허브 공간('.')으로 통째로 미러링합니다.
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" sftp://"$SFTP_HOST":2022 <<EOF
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no"
          mirror --reverse --delete --parallel=5 /squaremap/web ./
          exit
          EOF

      - name: 변경된 파일이 있으면 깃허브에 강제 푸시
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 브랜치가 유실되지 않도록 main 브랜치로 확실하게 고정합니다.
          git checkout -b main || git checkout main || true
          
          git add .
          # 변경사항(업데이트된 지도 타일 등)이 생겼을 때만 커밋 및 푸시를 실행합니다.
          git diff --quiet && git diff --staged --quiet || (git commit -m "실시간 맵 폴더 구조 자동 최신화 (${{ github.run_id }})" && git push origin main)
