name: 3분 단위 스퀘어맵 실시간 동기화

on:
  schedule:
    - cron: '*/3 * * * *' # 3분마다 자동으로 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  sync-map:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: SFTP 안전 다운로드 (공인 액션 사용)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          server: ${{ secrets.SFTP_HOST }}
          port: 2028
          # 원격 서버(호스팅)의 최상위 squaremap/web 폴더를 지정합니다.
          # 만약 실패하면 아래 line을 /squaremap/web 대신 그냥 squaremap/web 으로 적어보세요.
          remote_path: '/squaremap/web'
          # 깃허브 액션 공간(로컬)의 현재 폴더로 다운로드합니다.
          local_path: './'
          # 업로드가 아니라 서버에서 '다운로드(가져오기)'를 수행하는 옵션입니다.
          sftp_args: '-R'

      - name: 변경된 파일이 있으면 깃허브에 푸시
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git checkout -b main || git checkout main || true
          
          git add .
          # 변경사항이 없을 때 에러 내지 않고 안전하게 패스
          git diff --quiet && git diff --cached --quiet || (git commit -m "실시간 맵 자동 최신화 (${{ github.run_id }})" && git push origin main)
