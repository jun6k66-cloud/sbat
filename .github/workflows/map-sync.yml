name: 3분 단위 스퀘어맵 실시간 동기화

on:
  schedule:
    - cron: '*/3 * * * *' # 3분마다 전 세계 깃허브 서버가 이 작업을 실행합니다.
  workflow_dispatch: # 원할 때 수동으로 실행할 수 있는 버튼을 만듭니다.

jobs:
  sync-map:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 위어드호스트 SFTP에서 스퀘어맵 파일 다운로드
        uses: lkeywood/sftp-actions@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 2022 # 위어드호스트 SFTP 표준 포트번호
          local_dir: './' 
          remote_dir: '/config/squaremap/web' # 패브릭 서버 스퀘어맵 웹 폴더 기본 경로
          action: 'download'

      - name: 변경된 파일이 있으면 깃허브에 강제 푸시
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "실시간 맵 자동 최신화 (${{ github.run_id }})" && git push)
