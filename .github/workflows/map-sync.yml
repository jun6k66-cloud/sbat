name: 3분 단위 스퀘어맵 실시간 동기화

on:
  schedule:
    - cron: '*/3 * * * *' # 3분마다 자동으로 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  sync-map:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 위어드호스트에서 스퀘어맵 폴더 통째로 복사 (미러링)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          
          # lftp를 실행하여 위어드호스트 서버(squaremap/web) -> 깃허브 현재 폴더(./)로 데이터를 긁어옵니다.
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" sftp://"$SFTP_HOST":2022 <<EOF
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no"
          echo "=== [서버 접속 성공] 현재 최상위 폴더 목록 ==="
          ls
          echo "=== 스퀘어맵 파일 동기화 시작 ==="
          mirror squaremap/web ./
          exit
          EOF

      - name: 변경된 파일이 있으면 깃허브에 강제 푸시
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git checkout -b main || git checkout main || true
          
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "실시간 맵 폴더 구조 자동 최신화 (${{ github.run_id }})" && git push origin main)
