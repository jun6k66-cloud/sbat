name: 3분 단위 스퀘어맵 실시간 동기화

on:
  schedule:
    - cron: '*/3 * * * *' # 3분마다 자동으로 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  sync-map:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 위어드호스트 SFTP에서 스퀘어맵 폴더 직접 다운로드 (노압축)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          # 순정 sshpass 및 sftp 연동 환경 세팅
          sudo apt-get update && sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

          echo "=== 순정 SFTP 연결 및 스퀘어맵 파일 수집 시작 ==="
          # 홈/서버/squaremap/web 경로에 맞춰 SFTP 접속 후 다운로드합니다.
          # -n 옵션을 주어 이미 가져온 파일은 패스하고 새 파일만 빠르게 가져옵니다.
          sshpass -p "$SFTP_PASSWORD" sftp -P 2022 -o ConnectTimeout=15 "$SFTP_USER@$SFTP_HOST" <<EOF
          cd squaremap/web
          get -n -r *
          exit
          EOF

      - name: 변경된 파일이 있으면 깃허브에 강제 푸시
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git checkout -b main || git checkout main || true
          
          git add .
          # 바뀐 이미지 조각(타일)이 있을 때만 골라서 깃허브 저장소에 업데이트합니다.
          git diff --quiet && git diff --staged --quiet || (git commit -m "실시간 맵 자동 최신화 (${{ github.run_id }})" && git push origin main)
