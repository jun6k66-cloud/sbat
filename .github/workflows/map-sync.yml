name: 3분 단위 스퀘어맵 실시간 동기화

on:
  schedule:
    - cron: '*/3 * * * *' # 3분마다 자동으로 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  sync-map:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 위어드호스트 SFTP에서 스퀘어맵 폴더 직접 다운로드 (자동 경로)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

          echo "=== 1단계: 서버 내 'web' 폴더의 실제 SFTP 절대경로 자동 추적 ==="
          # 포트 번호를 2028로 수정했습니다.
          TARGET_DIR=$(sshpass -p "$SFTP_PASSWORD" ssh -p 2028 -o StrictHostKeyChecking=no "$SFTP_USER@$SFTP_HOST" "find . -type d -name web -print -quit" | sed 's|^\./||')
          
          if [ -z "$TARGET_DIR" ]; then
            echo "오류: 서버 내부에서 'web' 이름의 폴더를 발견하지 못했습니다. 경로를 확인해 주세요."
            exit 1
          fi
          echo "=> 자동 탐색된 진짜 SFTP 경로: $TARGET_DIR"

          echo "=== 2단계: 자동 추적된 경로에서 최신 파일만 골라 다운로드 ==="
          # 포트 번호를 2028로 수정했습니다.
          sshpass -p "$SFTP_PASSWORD" sftp -P 2028 -o ConnectTimeout=15 "$SFTP_USER@$SFTP_HOST" <<EOF
          cd "$TARGET_DIR"
          get -n -r *
          exit
          EOF

      - name: 변경된 파일이 있으면 깃허브에 강제 푸시
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git checkout -b main || git checkout main || true
          
          git add .
          # 기존 코드의 오타 'git quiet'를 제거하고 올바른 조건문(변경사항이 있으면 커밋/푸시)으로 수정했습니다.
          git diff --quiet && git diff --cached --quiet || (git commit -m "실시간 맵 자동 최신화 (${{ github.run_id }})" && git push origin main)
