name: 3분 단위 스퀘어맵 실시간 동기화

on:
  schedule:
    - cron: '*/3 * * * *' # 3분마다 자동 실행
  workflow_dispatch: # 수동 실행 버튼 생성

jobs:
  sync-map:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          allow-unauthenticated-repositories: true

      - name: 위어드호스트에서 폴더 및 파일 통째로 미러링 다운로드
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          # 하위 폴더와 대량의 이미지 타일을 완벽하게 동기화하기 위해 lftp를 설치합니다.
          sudo apt-get update && sudo apt-get install -y lftp
          
          # lftp를 이용해 위어드호스트의 스퀘어맵 웹 폴더를 현재 깃허브 공간('.')으로 통째로 복사(mirror)합니다.
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" sftp://"$SFTP_HOST":2022 <<EOF
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no"
          mirror --reverse --delete --parallel=5 /config/squaremap/web ./
          exit
          EOF

      - name: 변경된 파일이 있으면 깃허브에 강제 푸시
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 최초 실행 시 브랜치가 꼬이지 않도록 처리
          git checkout -b main || git checkout main || true
          
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "실시간 맵 폴더 구조 자동 최신화 (${{ github.run_id }})" && git push origin main)
