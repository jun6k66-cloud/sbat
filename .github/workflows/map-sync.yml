name: 3분 단위 스퀘어맵 실시간 동기화

on:
  schedule:
    - cron: '*/3 * * * *' # 3분마다 전 세계 깃허브 서버가 이 작업을 실행합니다.
  workflow_dispatch: # 수동 실행 버튼 생성

jobs:
  sync-map:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 위어드호스트 SFTP에서 스퀘어맵 파일 직접 다운로드
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          # 보안 연결을 위해 위어드호스트의 SSH 키를 검증 없이 수락하도록 설정
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          
          # sshpass를 설치하여 비밀번호를 자동으로 입력하게 만듭니다.
          sudo apt-get update && sudo apt-get install -y sshpass
          
          # SFTP 서버에 접속하여 '/config/squaremap/web' 폴더의 모든 파일(*)을 내 깃허브 공간으로 가져옵니다.
          sshpass -p "$SFTP_PASSWORD" sftp -P 2022 "$SFTP_USER@$SFTP_HOST" <<EOF
          cd /config/squaremap/web
          get -r *
          exit
          EOF

      - name: 변경된 파일이 있으면 깃허브에 강제 푸시
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          # 변경 사항이 있을 때만 커밋하고 푸시하여 꼬임을 방지합니다.
          git diff --quiet && git diff --staged --quiet || (git commit -m "실시간 맵 자동 최신화 (${{ github.run_id }})" && git push)
